<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./Nesab-AI.jpg">
  <link rel="icon" type="image/png" sizes="16x16" href="./Nesab-AI.jpg">
  <link rel="apple-touch-icon" sizes="180x180" href="./Nesab-AI.jpg">
  <title>حاسبة تمويل عقاري - نسب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* الخلفية الأساسية: أسود عميق مائل لزرقة الليل */
      --bg: #090a0f;

      /* البطاقات: رمادي داكن جداً ليعطي عمقاً (Depth) */
      --card: #12141d;
      --card2: #1a1d29;

      /* الحدود: ألوان هادئة لا تشتت العين */
      --border: #242731;
      --border2: #2d313e;

      /* ألوان التمييز (Action Colors) */
      --neon2: #5d5fef;
      /* أرجواني ملكي للروابط والأزرار */
      --gold: #fde68a;
      /* ذهبي هادئ لإبراز المبالغ المالية */
      --green: #00d68f;
      /* أخضر للنتائج الإيجابية */

      /* النصوص */
      --text: #ffffff;
      --muted: #8e929d;
      /* للنصوص الثانوية والتوضيحية */

      /* الحقول الإدخالية */
      --inp: #050608;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
      img { max-width: 100%; height: auto; }

    body {
      font-family: "Cairo", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      direction: rtl;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(93, 95, 239, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .hdr {
      border-bottom: 1px solid var(--border2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;}

    .logo-txt h1 {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
    }

.logo-txt p {
    font-size: clamp(0.75rem, 2vw, 1.05rem);
    color: var(--text);
   margin: 0;
}

    .hdr-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      font-size: 0.72rem;
      color: #fff;
    }

    .hdr-meta .hdr-link {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1.5px;
    }


    .hdr-meta .hdr-link {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1.5px;
    }

    .hdr-meta a {
      color: #fff;
      text-decoration: none;
    }

    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.65rem;
      color: #fff;
        margin-top: 0;
    }

    .main {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px 14px 100px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      right: 20px;
      left: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon2), transparent);
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 140px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon2));
    }

    .card2 {
      background: var(--card2);
    }

    .sec-t {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--neon);
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 3px;
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 9px 12px;
      background: var(--inp);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: "Cairo", sans-serif;
      font-size: 0.88rem;
      transition: border-color 0.2s;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--neon2);
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.15);
    }

    .field select option {
      background: #0a1a35;
    }

    .r2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sub {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .sub-t {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--neon2);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

 .btn-calc {
  width: 100%;
  padding: 16px;
  /* التدرج اللوني الشبكي المستوحى من الصورة */
  background: radial-gradient(circle at 10% 10%, rgba(131, 144, 250, 0.4) 0%, transparent 40%),
              radial-gradient(circle at 90% 90%, rgba(253, 230, 138, 0.25) 0%, transparent 40%),
              radial-gradient(circle at 50% 110%, rgba(255, 133, 162, 0.2) 0%, transparent 40%),
              #e2e8f0; /* اللون الأساسي الفاتح */

  border: 1px solid rgba(255, 255, 255, 0.1); /* حدود خفيفة جداً للدمج */
  border-radius: 12px;

  /* تغيير لون النص للأسود أو الرمادي الداكن جداً للوضوح */
  color: #12141d;
  font-weight: 800;
  font-size: 1rem;
  font-family: 'Cairo';
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s ease;

  /* إضافة توهج خارجي خفيف ناعم */
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
}

/* تأثير عند تمرير الماوس لجعل التدرج أكثر حيوية */
.btn-calc:hover {
  background: radial-gradient(circle at 10% 10%, rgba(131, 144, 250, 0.5) 0%, transparent 40%),
              radial-gradient(circle at 90% 90%, rgba(253, 230, 138, 0.35) 0%, transparent 40%),
              radial-gradient(circle at 50% 110%, rgba(255, 133, 162, 0.3) 0%, transparent 40%),
              #f1f5f9;
  box-shadow: 0 0 25px rgba(255, 255, 255, 0.06);
}
    .btn-calc:active {
      transform: scale(0.97);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: rgba(0, 102, 255, 0.15);
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--neon);
      font-family: "Cairo", sans-serif;
      font-size: 0.84rem;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .res-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: var(--card);
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    .res-row.hl {
      border-color: var(--neon);
      background: rgba(0, 200, 255, 0.04);
    }

    .res-row.hl .rv {
      font-size: 1.05rem;
      color: var(--neon);
    }

    .res-row.hl2 {
      border-color: var(--gold);
      background: rgba(240, 180, 41, 0.04);
    }

    .res-row.hl2 .rv {
      color: var(--gold);
    }

    .res-row.hl3 {
      border-color: var(--green);
      background: rgba(0, 214, 143, 0.04);
    }

    .res-row.hl3 .rv {
      color: var(--green);
    }

    .res-row .rl {
      font-size: 0.74rem;
      color: var(--muted);
    }

    .res-row .rv {
      font-weight: 700;
      font-size: 0.92rem;
    }

    .dec-badge {
      text-align: center;
      padding: 12px;
      border-radius: 11px;
      font-size: 1rem;
      font-weight: 900;
      margin-top: 10px;
    }

    .dec-badge.ok {
      background: rgba(0, 214, 143, 0.1);
      border: 1px solid var(--green);
      color: var(--green);
    }

    .export-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-export {
      padding: 10px;
      border: none;
      border-radius: 9px;
      font-family: "Cairo", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-pdf {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: #fff;
    }

    .btn-png {
      background: linear-gradient(135deg, #0066ff, #00c8ff);
      color: #fff;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .footer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 10px 20px 14px;
      position: relative;
      z-index: 1;
    }

    .ftr-r {
      font-size: 0.63rem;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ftr-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .ftr-icons a {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.2s;
    }
    .ftr-icons a:hover { opacity: 0.85; transform: scale(1.1); }

    .wa {
      background: #25d366;
    }

    .tw {
      background: #000;
    }

    .tg {
      background: #0088cc;
    }

    @media (min-width: 768px) {
      .main {
        max-width: 800px;
        padding: 24px 20px 100px;
      }

      .card {
        padding: 22px;
      }
    }

    @media (min-width: 1024px) {
      .main {
        max-width: 900px;
      }
    }

    @media (max-width: 400px) {
      .hdr {
        padding: 10px 12px;
      }

      .main {
        padding: 10px 8px 100px;
      }

      .card {
        padding: 14px;
      }

      .r2 {
        gap: 8px;
      }
    }
      a.logo {
        display: inline-flex;
        width: fit-content;
        max-width: 100%;
      }
      .subpage-logo {
        width: clamp(110px, 14vw, 120px);
        height: auto;
        object-fit: contain;
        display: block;
        margin: 0 auto 4px auto;
        background: none;
        box-shadow: none;
        mix-blend-mode: normal;
      }
        @media (max-width: 600px) {
      .hdr {
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 14px 12px;
      }
      .hdr-meta {
        width: 100%;
      }
    }
    
    /* === Redesigned Header Info Section === */
    .hdr-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border: 1px solid rgba(93, 95, 239, 0.35);

    }
    .hdr-url-pill {
      background: rgba(93,95,239,0.12);

    .hdr-row2 {
      display: flex;
      align-items: center;

      gap: 8px;
    }
    .hdr-update {
      font-size: 0.72rem;

    }
    .hdr-icons {
      display: flex;
      align-items: center;

    }
    .hdr-icons a {
      width: 28px;

    .hdr-icons a:hover { opacity: 0.85; transform: scale(1.1); }
    .hdr-icons .wa { background: #25d366; }

      .hdr-meta { min-width: 0; width: 100%; max-width: 100%; }
      .hdr-row2 { flex-wrap: wrap; justify-content: center; gap: 6px; }
    }
    
    /* Disclaimer bar */
    .nesab-disclaimer-bar {
      background: var(--card2, #1a1d29);
      border-top: 1px solid rgba(226, 176, 74, 0.4);
      padding: 10px 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted, #8e929d);
      direction: rtl;
      position: relative;
      z-index: 10;
    }
    .nesab-disclaimer-bar a {
      color: var(--gold, #fde68a);
      text-decoration: underline;
      margin-right: 8px;
    }
    
                                /* === Header — Material Design 56px mobile / 64px tablet+ === */
    :root {
      --logo-size: 36px;
      --header-px: 16px;
      --header-py: 10px;
      --title-size: 16px;
      --subtitle-size: 12px;
    }

    /* .hdr = .page-header */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      direction: rtl;
      padding: var(--header-py) var(--header-px);
      min-height: calc(var(--logo-size) + var(--header-py) * 2);
      box-sizing: border-box;
      border-bottom: 1px solid var(--border2);
      position: relative;
      z-index: 1;
    }

    /* .logo-wrap = .hdr-brand */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-direction: row;
    }

    /* .subpage-logo = .hdr-logo */
    .subpage-logo {
      width: var(--logo-size);
      height: var(--logo-size);
      flex: 0 0 var(--logo-size);
      object-fit: contain;
    }

    /* .logo-txt = .hdr-text */
    .logo-txt {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* .logo-txt h1 = .hdr-title */
    .logo-txt h1 {
      font-size: var(--title-size);
      font-weight: 600;
      line-height: 1.2;
      margin: 0;
    }

    /* .logo-txt p = .hdr-subtitle */
    .logo-txt p {
      font-size: var(--subtitle-size);
      line-height: 1.2;
      margin: 0;
      opacity: 0.6;
    }

    @media (min-width: 768px) {
      :root {
        --logo-size: 40px;
        --header-px: 24px;
        --header-py: 12px;
        --title-size: 17px;
        --subtitle-size: 13px;
      }
    }

    @media (min-width: 1024px) {
      :root {
        --logo-size: 44px;
        --header-px: 32px;
        --header-py: 14px;
        --title-size: 18px;
        --subtitle-size: 13px;
      }
    }

    /* === Page Meta — bottom section === */
    body {
      display: flex;
      flex-direction: column;
    }
    .main { flex: 1; }

    .page-meta {
      border-top: 1px solid var(--border2);
      background: var(--card2);
      padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .pm-url {
      font-size: 0.78rem;
      font-weight: 700;
      color: #c8c9ff;
      text-decoration: none;
      letter-spacing: 0.5px;
      display: block;
    }
    .pm-url:hover { color: #fff; }
    .page-meta-site {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .pm-row2 {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pm-update {
      font-size: 0.72rem;
      font-weight: 600;
      color: #4ade80;
      white-space: nowrap;
    }
    .pm-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pm-icons a {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .pm-icons a:hover { opacity: 0.85; transform: scale(1.1); }
    .pm-email a {
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }
    .pm-email a:hover { color: #c8c9ff; }

    /* === Container responsive fix === */
    .main {
      width: 100%;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .main {
        max-width: 860px !important;
        padding-left: 24px !important;
        padding-right: 24px !important;
      }
    }
    @media (min-width: 1024px) {
      .main {
        max-width: 960px !important;
        padding-left: 32px !important;
        padding-right: 32px !important;
      }
    }

    /* Overflow & accessibility */
    body { overflow-x: hidden; min-width: 320px; }
    table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    @media (max-width: 600px) {
      input, select, textarea { font-size: 16px !important; }
    }

<body>

  <div class="hdr">
    <div class="logo-wrap">
      <a href="/" class="logo" aria-label="Nesab"><img src="assets-logo/dar-2.svg" alt="Nesab Logo" loading="eager" class="subpage-logo"></a>

      <div class="logo-txt">
          <h1>التمويل العقاري</h1>
          <p>نسب</p>
        </div>
    </div>
    </div>
  <div class="main">
    <!-- PAGE 1: INPUTS -->
    <div id="inputPage" class="page active">
      <div class="card">
        <div class="sec-t">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          بيانات العميل
        </div>
        <div class="sub">
          <div class="sub-t">💰 المعلومات المالية</div>
          <div class="r2">
            <div class="field">
              <label>راتب العميل (ريال)</label>
              <input type="text" id="salary" value="9,767" oninput="fmtInput(this)" inputmode="numeric">
            </div>
            <div class="field">
              <label>مدة التمويل العقاري (سنة)</label>
              <input type="text" id="mortgageYears" value="25" oninput="fmtInput(this)" inputmode="numeric">
            </div>
          </div>
          <div class="r2">
            <div class="field">
              <label>هامش الربح (%)</label>
              <input type="text" id="profitRate" value="4.05" inputmode="decimal">
            </div>
            <div class="field">
              <label>قسط التمويل الشخصي (ريال)</label>
              <input type="text" id="personalInstall" value="2,922" oninput="fmtInput(this)" inputmode="numeric">
            </div>
          </div>
          <div class="field">
            <label>عدد الأقساط المتبقية من التمويل الشخصي (شهر)</label>
            <input type="text" id="remainingPersonal" value="60" oninput="fmtInput(this)" inputmode="numeric">

  <script>
    let supportOn = true, etizazOn = false;
    function parseNum(s) { return parseFloat(String(s).replace(/,/g, '')) || 0 }
    function fmt(n) { return Math.round(n).toLocaleString('en-US') }
    function fmtInput(el) {
      let v = el.value.replace(/[^0-9.]/g, '');
      if (el.id === 'profitRate') { el.value = v; return; }
      let num = parseFloat(v) || 0;
      if (v && !v.endsWith('.')) { el.value = Math.round(num).toLocaleString('en-US'); }
    }
    function setToggle(type, val) {
      if (type === 'support') {
        supportOn = val;
        document.getElementById('btnSupportY').className = 'tog-btn' + (val ? ' on' : '');
        document.getElementById('btnSupportN').className = 'tog-btn' + (val ? '' : ' on');
      } else {
        etizazOn = val;
        document.getElementById('btnEtizazY').className = 'tog-btn' + (val ? ' on' : '');
        document.getElementById('btnEtizazN').className = 'tog-btn' + (val ? '' : ' on');
      }
    }
    function showInput() {
      document.getElementById('inputPage').className = 'page active';
      document.getElementById('resultPage').className = 'page';
    }
    function showResult() {
      document.getElementById('inputPage').className = 'page';
      document.getElementById('resultPage').className = 'page active';
      window.scrollTo(0, 0);
    }
    function calculate() {
      let salary = parseNum(document.getElementById('salary').value);
      let years = parseNum(document.getElementById('mortgageYears').value);
      let profitR = parseFloat(document.getElementById('profitRate').value) || 0;
      profitR = profitR / 100;
      let personalInst = parseNum(document.getElementById('personalInstall').value);
      let remPers = parseNum(document.getElementById('remainingPersonal').value);

      let totalMonths = years * 12;
      let personalPct = salary > 0 ? personalInst / salary : 0;
      let dedRate = salary >= 15000 ? 0.65 : 0.55;
      let productPct = dedRate;
      let monthlyDed = productPct * salary;
      let duringPct = productPct - personalPct;
      let duringInst = salary * duringPct;
      let duringInstCapped = Math.min(duringInst, monthlyDed);
      let afterInst = monthlyDed;

      let totalDuring = duringInstCapped * remPers;
      let remMonths = totalMonths - remPers;
      if (remMonths < 0) remMonths = 0;
      let totalAfter = afterInst * remMonths;
      let totalWithProfit = totalDuring + totalAfter;
      let maxAmount = totalWithProfit / (1 + (profitR * years));
      let totalProfit = totalWithProfit - maxAmount;

      let housingVal = 0;
      if (supportOn) { housingVal = salary <= 10000 ? 150000 : 100000 }
      let etizazVal = etizazOn ? 160000 : 0;
      let grandTotal = maxAmount + housingVal + etizazVal;
      let adminFee = 5750;

      let html = `
  <div class="res-section">🏠 برنامج 2 في 1</div>
  <div class="res-row hl"><span class="rl">مبلغ التمويل العقاري (2 في 1)</span><span class="rv">${fmt(maxAmount)} ر.س</span></div>
  <div class="res-row"><span class="rl">القسط خلال فترة التمويل الشخصي (${remPers} شهر)</span><span class="rv">${fmt(duringInstCapped)} ر.س / شهر</span></div>
  <div class="res-row"><span class="rl">القسط بعد انتهاء التمويل الشخصي (${remMonths} شهر)</span><span class="rv">${fmt(afterInst)} ر.س / شهر</span></div>
  <div class="res-row"><span class="rl">هامش الربحية لمدة التمويل</span><span class="rv">${fmt(totalProfit)} ر.س</span></div>
  <div class="res-row"><span class="rl">إجمالي 2×1 بالأرباح</span><span class="rv">${fmt(totalWithProfit)} ر.س</span></div>
  <div class="res-row"><span class="rl">إجمالي فترة التمويل</span><span class="rv">${totalMonths} شهر</span></div>

  <div class="res-section">💳 الإجمالي مع الدعم</div>
  <div class="res-row"><span class="rl">الدعم السكني</span><span class="rv">${supportOn ? fmt(housingVal) + ' ر.س' : 'لا يوجد'}</span></div>
  <div class="res-row"><span class="rl">اعتزاز (وزارة الدفاع)</span><span class="rv">${etizazOn ? fmt(etizazVal) + ' ر.س' : 'لا يوجد'}</span></div>
  <div class="res-row hl2"><span class="rl">الإجمالي مع الدعم والاعتزاز</span><span class="rv">${fmt(grandTotal)} ر.س</span></div>
  <div class="res-row"><span class="rl">الرسوم الإدارية والتقييم</span><span class="rv">${fmt(adminFee)} ر.س</span></div>

  <div class="dec-badge ok">✅ تم الاحتساب بنجاح</div>`;

      document.getElementById('resultArea').innerHTML = html;
      showResult();
    }
  </script>
